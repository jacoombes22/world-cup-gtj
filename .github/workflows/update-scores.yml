name: Scheduled World Cup Data Update

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 1. Pull down the fresh match data and write it to the workspace
      - name: Run calculation engine
        run: npm run update-data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      # 2. Immediately build the application into the /dist folder
      - name: Build React Application
        run: npm run build

      # 3. Deploy the fresh /dist folder directly to your live site
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages